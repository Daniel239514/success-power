name: Supabase keep-alive

# Supabase free tier pauses projects after ~7 days of no database activity.
# A paused project kills all auth (signup/login) until manually resumed.
# This workflow runs every 4 days and makes a lightweight query so the
# project never goes idle long enough to trigger the auto-pause.

on:
  schedule:
    - cron: '0 10 */4 * *'   # 10:00 UTC every 4 days
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3        # kill the job if it hangs (e.g. Supabase paused)
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "406" ]; then
            echo "Unexpected status $STATUS — Supabase may be paused or unreachable"
            exit 1
          fi
          echo "Supabase is alive."
